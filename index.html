<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZugInfoMonitor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="display-container">
        <div class="screen-wrapper">
            <canvas class="header" width="4260" height="160"></canvas>
            <div class="main-frame">
                <canvas class="display-trenner-links" width="200" height="1080"></canvas>
                <canvas class="display1" id="display1" width="1920" height="800"></canvas>
                <canvas class="display-trenner" width="40" height="1080"></canvas>
                <canvas class="display2-zug1" id="display2_zug1" width="960" height="800"></canvas>
                <canvas class="display2-zug2" id="display2_zug2" width="960" height="800"></canvas>
                <canvas class="display-trenner-rechts" width="200" height="1080"></canvas>
                <canvas class="display1-wagenreihung" id="display1_wagenreihung" width="1920" height="280"></canvas>
                <canvas class="display2-zug1-wagenreihung" id="display2_zug1_wagenreihung" width="960"
                    height="280"></canvas>
                <canvas class="display2-zug2-wagenreihung" id="display2_zug2_wagenreihung" width="960"
                    height="280"></canvas>
                <canvas class="footer" width="4260" height="160"></canvas>
            </div>
        </div>
    </div>

    <div class="settings-container">
        <div class="settings-header">
            <h2>ZugInfoMonitor</h2>
            <div class="header-actions">
                <button id="download-btn">📸 Screenshot downloaden</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="main-controls">
                <div class="settings-frame tab-container" id="train_selection">
                        <div class="tab-bar">
                        <label class="tab"><input type="radio" name="zug_select" value="1" checked> Zug 1</label>
                        <label class="tab"><input type="radio" name="zug_select" value="2"> Zug 2</label>
                        <label class="tab"><input type="radio" name="zug_select" value="3"> Zug 3</label>
                        <label class="tab"><input type="radio" name="zug_select" value="4"> Zug 4</label>
                        <label class="tab"><input type="radio" name="zug_select" value="5"> Zug 5</label>
                        <label class="tab"><input type="radio" name="zug_select" value="6"> Zug 6</label>
                        </div>
                        <div class="tab-actions">
                        <label class="checkbox-label"><input type="checkbox" id="display3_rotieren_checkbox"> 3-6 rotieren</label>
                        <button id="edit_formation_btn" class="btn-secondary">Wagenreihung bearbeiten</button>
                        </div>
                </div>

                <div id="train_settings_container"></div>
        </div>

            <div class="side-controls">
                <div class="settings-frame" id="frame_links_oben">
                    <h3>Anzeige Wagenreihung</h3>
                    <div class="options-grid">
                        <label class="radio-card"><input type="radio" name="wahl" value="rotierend"> Rotierend</label>
                        <label class="radio-card"><input type="radio" name="wahl" value="wagennummern" checked> Nummern</label>
                        <label class="radio-card"><input type="radio" name="wahl" value="ausstattung"> Ausstattung</label>
                        <label class="radio-card"><input type="radio" name="wahl" value="klasse"> Klasse</label>
                    </div>
                    
                    <h3 style="margin-top: 25px;">Bahnhof/Station</h3>
                    <div class="form-row column-layout">
                        <label>Name: <input type="text" id="entry_stop_name" placeholder="z.B. Hannover Hbf"></label>
                        <label>Gleis: <input type="text" id="entry_gleis" class="short-input"></label>
                        <label>Zeit: <input type="datetime-local" id="departureTime" name="departureTime"></label>
                        <div class="checkbox-group">
                            <label class="checkbox-label"><input type="checkbox" id="abfahrten_checkbox"> Abfahrten</label>
                            <label class="checkbox-label"><input type="checkbox" id="ankuenfte_checkbox"> Ankünfte</label>
                        </div>
                        <div class="button-group-vertical">
                            <button id="fetch_data_btn" class="btn-primary">Daten abrufen</button>
                            <button id="export_all_btn" class="btn-secondary">Exportieren</button>
                            <button id="import_all_btn" class="btn-secondary">Importieren</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <input type="file" id="file-input" style="display:none;" accept=".json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="js/main.js"></script>

</body>

</html>
