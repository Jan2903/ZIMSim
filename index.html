<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZugInfoMonitor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="page-header">
        <h2>ZugInfoMonitor</h2>
        <div class="header-actions">
            <button id="download-btn">📸 Screenshot downloaden</button>
        </div>
    </header>

    <div class="display-container">
        <div id="display-container" style="position: relative; width: 100%; height: 100%; background-color: var(--db-dark); overflow: hidden;">
            <div id="hardware-bezel" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none;"></div>
            <canvas id="zimCanvas" width="4428" height="1600" style="position: absolute; top: 0; left: 0; z-index: 10;"></canvas>
        </div>
    </div>

    <div class="settings-container">
        <div class="dashboard-grid">
            <div class="main-controls">
                <!-- Fahrten-Liste (ersetzt die alten 6 Tabs) -->
                <div class="settings-frame" id="journey_list_frame">
                    <div class="journey-list-header">
                        <h3>Fahrten</h3>
                        <div class="journey-list-actions">
                            <button id="add_journey_btn" class="btn-primary btn-sm">+ Fahrt hinzufügen</button>
                        </div>
                    </div>
                    <div id="journey_list" class="journey-list">
                        <!-- Dynamisch generiert von events.js -->
                    </div>
                </div>
            </div>

            <div class="side-controls">
                <div class="settings-frame" id="frame_links_oben">
                    <h3>Anzeige Wagenreihung</h3>
                    <div class="options-grid">
                        <label class="radio-card"><input type="radio" name="wahl" value="rotierend"> Rotierend</label>
                        <label class="radio-card"><input type="radio" name="wahl" value="wagennummern" checked> Nummern</label>
                        <label class="radio-card"><input type="radio" name="wahl" value="ausstattung"> Ausstattung</label>
                        <label class="radio-card"><input type="radio" name="wahl" value="klasse"> Klasse</label>
                    </div>

                    <h3 style="margin-top: 25px;">Layout</h3>
                    <div class="options-grid">
                        <label class="radio-card"><input type="radio" name="layout_select" value="standard" checked> Standard</label>
                        <label class="radio-card"><input type="radio" name="layout_select" value="voranzeiger"> Voranzeiger</label>
                    </div>
                    
                    <h3 style="margin-top: 25px;">Bahnhof/Station</h3>
                    <div class="form-row column-layout">
                        <label>Name: <input type="text" id="entry_stop_name" placeholder="z.B. Hannover Hbf"></label>
                        <label>EVA-Nr: <input type="text" id="entry_stop_id" class="short-input" placeholder="8000152"></label>
                        <label>Gleis: <input type="text" id="entry_gleis" class="short-input"></label>
                        <div class="checkbox-group">
                            <label class="checkbox-label"><input type="checkbox" id="nrw_mode_checkbox"> NRW-Modus</label>
                        </div>
                    </div>

                    <h3 style="margin-top: 25px;">Bahnsteig</h3>
                    <div class="form-row column-layout">
                        <label>Länge (m): <input type="number" id="platform_length" class="short-input" value="420"></label>
                    </div>

                    <div class="button-group-vertical" style="margin-top: 15px;">
                        <button id="export_all_btn" class="btn-secondary">📤 Exportieren</button>
                        <button id="import_all_btn" class="btn-secondary">📥 Importieren</button>
                        <button id="import_db_btn" class="btn-secondary">🚄 DB-Daten importieren</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Import-Modal für DB-Daten -->
    <div id="db_import_modal" class="modal-overlay hidden">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3>DB-Daten importieren</h3>
                <button class="modal-close" data-close-modal="db_import_modal">✕</button>
            </div>
            <div class="modal-body">
                <div class="import-tabs">
                    <label class="radio-card"><input type="radio" name="import_type" value="departure_list" checked> Abfahrtstafel</label>
                    <label class="radio-card"><input type="radio" name="import_type" value="journey"> Zuglauf</label>
                    <label class="radio-card"><input type="radio" name="import_type" value="formation"> Formation</label>
                </div>
                <textarea id="db_import_textarea" rows="12" placeholder='JSON hier einfügen...'></textarea>
                <div class="import-info">
                    <p id="import_type_hint">Füge das JSON einer DB-Abfahrtstafel ein (entries[]-Array).</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="db_import_execute" class="btn-primary">Importieren</button>
                <button class="btn-secondary" data-close-modal="db_import_modal">Abbrechen</button>
            </div>
        </div>
    </div>

    <!-- Formation-Editor Modal (bleibt grundsätzlich gleich) -->
    <div id="formation_modal" class="modal-overlay hidden">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3 id="formation_modal_title">Wagenreihung bearbeiten</h3>
                <button class="modal-close" data-close-modal="formation_modal">✕</button>
            </div>
            <div class="modal-body" id="formation_editor_body">
                <!-- Dynamisch generiert -->
            </div>
            <div class="modal-footer">
                <button id="formation_import_btn" class="btn-secondary">📥 Import</button>
                <button id="formation_export_btn" class="btn-secondary">📤 Export</button>
                <button id="formation_add_coach_btn" class="btn-secondary">+ Wagen</button>
                <button id="formation_save_btn" class="btn-primary">Speichern</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none;" accept=".json">
    <input type="file" id="formation-file-input" style="display:none;" accept=".json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="js/main.js"></script>

</body>

</html>
